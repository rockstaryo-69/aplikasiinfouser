version: '3.9'

services:
  # ─── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cyberscope-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cyberscope
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-cyberscope_secure_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyberscope"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberscope-net

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cyberscope-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_2026} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cyberscope-net

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberscope-api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV:    production
      PORT:        4000
      PG_HOST:     postgres
      PG_PORT:     5432
      PG_DATABASE: cyberscope
      PG_USER:     postgres
      REDIS_HOST:  redis
      REDIS_PORT:  6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cyberscope-net

  # ─── Scan Worker ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: cyberscope-worker
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      PG_HOST:    postgres
      REDIS_HOST: redis
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - cyberscope-net

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: cyberscope-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cyberscope-net

# ─── Volumes & Networks ───────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cyberscope-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
